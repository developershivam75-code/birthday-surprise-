<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Birthday Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("jWndomUCqjdHtRz4k");
       })();
    </script>

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #fff5f6; /* Soft pinkish background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }
        h1 { color: #d63031; margin-bottom: 30px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-gap: 8px;
        }
        .cell {
            width: 100px; height: 100px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5em; font-weight: bold;
            background-color: #fff; color: #333;
            cursor: pointer; border: 2px solid #ffccd2;
            border-radius: 12px; transition: all 0.2s ease;
        }
        .cell:hover { background-color: #fff0f3; transform: scale(1.02); }
        
        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.8); justify-content: center; align-items: center;
            z-index: 100;
        }
        .modal-content { 
            background-color: white; padding: 40px; border-radius: 20px; 
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 80%;
        }
        
        /* New Wish Styling */
        .warm-wish {
            font-style: italic;
            color: #636e72;
            margin: 15px 0;
            line-height: 1.5;
            font-size: 1.1em;
        }

        .show { display: flex; }
        button { 
            margin-top: 20px; padding: 12px 30px; cursor: pointer; 
            background: linear-gradient(45deg, #ff4757, #ff6b81); color: white; border: none; 
            border-radius: 25px; font-size: 1.1em; font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }
    </style>
</head>
<body>

    <h1>Tic Tac Toe</h1>

    <div class="board"></div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 style="color: #d63031;">🎉 Happy Birthday, Chitra! 🎉</h2>
            
            <p class="warm-wish">
                "To a wonderful soul who brings so much light into our lives. <br>
                May your year be as bright and winning as this game!" 🌟
            </p>
            
            <p>You've won the game and our hearts! 🎂</p>
            <button id="close-modal">Play Again</button>
        </div>
    </div>

    <audio id="birthday-audio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>

    <script>
        const board = document.querySelector('.board');
        const bdayMusic = document.getElementById('birthday-audio');
        let cells = [];
        let currentPlayer = 'X';
        let gameActive = true;
        let emailSent = false;
        const winnerName = "Chitra";

        function createBoard() {
            board.innerHTML = '';
            cells = [];
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.addEventListener('click', cellClicked);
                board.appendChild(cell);
                cells.push(cell);
            }
        }

        function cellClicked(e) {
            const cell = e.target;
            if (cell.textContent !== '' || !gameActive) return;

            cell.textContent = currentPlayer;
            checkWin();
            if(gameActive) currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        }

        function checkWin() {
            const wins = [[0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6]];
            for (const combo of wins) {
                const [a, b, c] = combo;
                if (cells[a].textContent && cells[a].textContent === cells[b].textContent && cells[a].textContent === cells[c].textContent) {
                    gameActive = false;
                    celebrate();
                }
            }
        }

        function celebrate() {
            // 1. Play Music
            bdayMusic.play().catch(e => console.log("Audio play blocked until interaction"));
            
            // 2. Confetti Ribbons
            triggerConfetti();
            
            // 3. Show Modal
            showModal();
            
            // 4. Send Email
            sendEmail();
        }

        function triggerConfetti() {
            var end = Date.now() + (5 * 1000);
            var colors = ['#ff4757', '#ffffff', '#ffbc00'];

            (function frame() {
              confetti({
                particleCount: 3,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: colors
              });
              confetti({
                particleCount: 3,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: colors
              });

              if (Date.now() < end) {
                requestAnimationFrame(frame);
              }
            }());
        }

        function showModal() {
            document.getElementById('modal').classList.add('show');
        }

        function sendEmail() {
            if (emailSent) return;
            emailjs.send('service_c2ryvtd', 'template_bb61x18', {
                winner_name: winnerName,
                to_email: 'aayushgupta7513@gmail.com',
                message: `${winnerName} just won! 🎈`
            }).then(() => emailSent = true);
        }

        document.getElementById('close-modal').addEventListener('click', () => {
            document.getElementById('modal').classList.remove('show');
            bdayMusic.pause();
            bdayMusic.currentTime = 0;
            resetGame();
        });

        function resetGame() {
            currentPlayer = 'X';
            gameActive = true;
            emailSent = false;
            createBoard();
        }

        createBoard();
    </script>
</body>
</html>
