<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Celebration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.4.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Basic styles for modal */
        body { font-family: Arial, sans-serif; }
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgb(0,0,0);
            background-color: rgba(0,0,0,0.4);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            text-align: center;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }
        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
        .celebrate {
            color: #28a745;
            font-size: 24px;
            margin-top: 20px;
        }
        #emailButton {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Happy Birthday, Aayush!</h1>
    <button id="openModal">Celebrate</button>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <p class="celebrate">Wishing you a day filled with love, joy, and celebration!</p>
            <button id="emailButton">Send Congratulations</button>
        </div>
    </div>

    <script>
        // Confetti Functionality
        function sendConfetti() {
            var duration = 5 * 1000; // Duration in milliseconds
            var end = Date.now() + duration;

            var colors = ['#bb0000', '#ffffff', '#00bb00', '#0000bb'];
            var randomColor = colors[Math.floor(Math.random() * colors.length)];

            (function frame() {
                confetti({
                    particleCount: 5,
                    startVelocity: 30,
                    spread: 360,
                    ticks: 60,
                    gravity: 1,
                    colors: [randomColor]
                });
                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        // Modal functionality
        var modal = document.getElementById("myModal");
        var btn = document.getElementById("openModal");
        var span = document.getElementsByClassName("close")[0];

        btn.onclick = function() {
            modal.style.display = "block";
            sendConfetti();
        }

        span.onclick = function() {
            modal.style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        // Email functionality (pseudo implementation)
        document.getElementById('emailButton').onclick = function() {
            window.location.href = 'mailto:aayushgupta7513@gmail.com?subject=Happy Birthday Aayush!&body=Wishing you a wonderful birthday filled with love and joy!';
        };
    </script>
</body>
</html>
