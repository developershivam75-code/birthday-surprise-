<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tic Tac Toe - Hayat's Birthday</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){ 
          // YOUR PUBLIC KEY
          emailjs.init("jWndomUCqjdHtRz4k"); 
       })();
    </script>

    <style>
        :root { --bg-color: #fff5f6; }
        
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; background-color: var(--bg-color); font-family: 'Segoe UI', sans-serif; margin: 0;
            overflow: hidden; transition: background-color 0.5s ease;
            touch-action: none; 
        }
        
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #ff4757, #ff6b81); color: white; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; cursor: pointer; text-align: center;
        }

        .refresh-hint {
            position: absolute; top: 20px; right: 20px; font-size: 1.5rem;
            cursor: pointer; opacity: 0.6; transition: 0.3s; z-index: 10;
        }

        h1 { color: #d63031; margin-bottom: 30px; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); grid-gap: 10px; }
        .cell {
            width: 100px; height: 100px; display: flex; align-items: center; justify-content: center;
            font-size: 2.5em; font-weight: bold; background-color: #fff; color: #333;
            cursor: pointer; border: 2px solid #ffccd2; border-radius: 15px; transition: 0.2s;
        }
        .cell:hover { background-color: #fff0f3; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.85); justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content { 
            background: white; padding: 40px; border-radius: 25px; text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 85%;
        }
        .warm-wish { font-style: italic; color: #636e72; margin: 20px 0; line-height: 1.6; }
        .show { display: flex; }

        button { 
            margin: 10px; padding: 15px 30px; cursor: pointer; border: none;
            border-radius: 30px; font-weight: bold; font-size: 1em;
        }
        .btn-play { background: #ff4757; color: white; }
        .btn-music { background: #2ed573; color: white; animation: pulse 1.5s infinite; }

        @keyframes disco {
            0% { background-color: #fff5f6; }
            50% { background-color: #fef5e7; }
            100% { background-color: #fff5f6; }
        }
        .disco-mode { animation: disco 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 70% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="color: white; font-size: 2.2em;">🎂 Hayat's B'day Game 🎈</h1>
        <p style="font-size: 1.1em;">Tap anywhere to Start!</p>
    </div>

    <div class="refresh-hint" onclick="location.reload()">🔄</div>

    <h1>Tic Tac Toe</h1>
    <div class="board"></div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 style="color: #d63031;">🎉 Happy Birthday, Hayat! 🎉</h2>
            <p class="warm-wish">"To a wonderful soul who brings so much light into our lives." 🌟</p>
            <button class="btn-music" id="play-music-btn">🎵 Play Melody</button>
            <br>
            <button class="btn-play" id="close-modal">Play Again</button>
        </div>
    </div>

    <script>
        const board = document.querySelector('.board');
        const startOverlay = document.getElementById('start-overlay');
        let cells = [];
        let currentPlayer = 'X';
        let gameActive = true;
        let emailSent = false;
        const winnerName = "Hayat";

        // --- 🎵 MUSIC ENGINE ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playNote(freq, start, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, start);
            gain.gain.setValueAtTime(0.2, start);
            gain.gain.exponentialRampToValueAtTime(0.01, start + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(start);
            osc.stop(start + duration);
        }

        function playHappyBirthday() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            playNote(262, now, 0.4); playNote(262, now + 0.5, 0.2); playNote(294, now + 0.7, 0.6);
            playNote(262, now + 1.4, 0.6); playNote(349, now + 2.1, 0.6); playNote(330, now + 2.8, 1.0);
        }

        // --- 📱 PULL TO REFRESH ---
        let touchStart = 0;
        window.addEventListener('touchstart', e => { touchStart = e.touches[0].pageY; }, false);
        window.addEventListener('touchend', e => {
            const touchEnd = e.changedTouches[0].pageY;
            if (touchStart < touchEnd - 100) { location.reload(); }
        }, false);

        startOverlay.addEventListener('click', function() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            this.style.display = 'none';
        });

        function createBoard() {
            board.innerHTML = '';
            cells = [];
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.addEventListener('click', cellClicked);
                board.appendChild(cell);
                cells.push(cell);
            }
        }

        function cellClicked(e) {
            const cell = e.target;
            if (cell.textContent !== '' || !gameActive) return;
            cell.textContent = currentPlayer;
            checkWin();
            if(gameActive) currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        }

        function checkWin() {
            const wins = [[0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6]];
            for (const combo of wins) {
                const [a, b, c] = combo;
                if (cells[a].textContent && cells[a].textContent === cells[b].textContent && cells[a].textContent === cells[c].textContent) {
                    gameActive = false;
                    celebrate();
                }
            }
        }

        function celebrate() {
            playHappyBirthday();
            document.body.classList.add('disco-mode');
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            document.getElementById('modal').classList.add('show');
            sendEmail(); // 2. TRIGGER EMAIL ON WIN
        }

        // 3. EMAIL SENDING FUNCTION
        function sendEmail() {
            if (emailSent) return;
            
            const serviceID = 'service_c2ryvtd';
            const templateID = 'template_bb61x18';

            emailjs.send(serviceID, templateID, {
                winner_name: winnerName,
                to_email: 'aayushgupta7513@gmail.com',
                message: `${winnerName} just won her birthday game! 🎈`
            })
            .then(() => {
                emailSent = true;
                console.log("Email notification sent!");
            }, (err) => {
                console.log("Email failed:", err);
            });
        }

        document.getElementById('play-music-btn').addEventListener('click', () => playHappyBirthday());
        document.getElementById('close-modal').addEventListener('click', () => location.reload());

        createBoard();
    </script>
</body>
</html>
