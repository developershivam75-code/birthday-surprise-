<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Hayat's Birthday</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){ emailjs.init("jWndomUCqjdHtRz4k"); })();
    </script>

    <style>
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; background-color: #fff5f6; font-family: 'Segoe UI', sans-serif; margin: 0;
            overflow: hidden;
        }
        
        /* Start Overlay for Phone Audio Unlock */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #ff4757, #ff6b81); color: white; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; cursor: pointer; text-align: center;
        }

        h1 { color: #d63031; margin-bottom: 30px; }
        
        .board { display: grid; grid-template-columns: repeat(3, 100px); grid-gap: 10px; }
        
        .cell {
            width: 100px; height: 100px; display: flex; align-items: center; justify-content: center;
            font-size: 2.5em; font-weight: bold; background-color: #fff; color: #333;
            cursor: pointer; border: 2px solid #ffccd2; border-radius: 15px; transition: 0.2s;
        }
        
        .cell:hover { background-color: #fff0f3; transform: scale(1.05); }

        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.85); justify-content: center; align-items: center; z-index: 100;
        }
        
        .modal-content { 
            background: white; padding: 40px; border-radius: 25px; text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 85%;
        }

        .warm-wish { font-style: italic; color: #636e72; margin: 20px 0; line-height: 1.6; font-size: 1.1em; }

        .show { display: flex; }

        button { 
            margin: 10px; padding: 15px 30px; cursor: pointer; border: none;
            border-radius: 30px; font-weight: bold; font-size: 1em; transition: 0.3s;
        }
        
        .btn-play { background: #ff4757; color: white; }
        
        .btn-music { 
            background: #2ed573; color: white; 
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(46, 213, 115, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(46, 213, 115, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(46, 213, 115, 0); }
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="color: white; font-size: 2.5em;">🎂 Hayat's Game 🎈</h1>
        <p style="font-size: 1.2em;">Tap to Start & Play Music!</p>
    </div>

    <h1>Tic Tac Toe</h1>
    <div class="board"></div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 style="color: #d63031;">🎉 Happy Birthday, Hayat! 🎉</h2>
            <p class="warm-wish">
                "To a wonderful soul who brings so much light into our lives. 
                May your year be as bright and winning as this game!" 🌟
            </p>
            <button class="btn-music" id="play-music-btn">🎵 Play Music</button>
            <br>
            <button class="btn-play" id="close-modal">Play Again</button>
        </div>
    </div>

    <audio id="birthday-audio" loop preload="auto">
        <source src="https://upload.wikimedia.org/wikipedia/commons/d/db/Happy_Birthday_To_You.ogg" type="audio/ogg">
        <source src="https://cdn.pixabay.com/audio/2022/11/22/audio_feb64f6930.mp3" type="audio/mpeg">
    </audio>

    <script>
        const board = document.querySelector('.board');
        const bdayMusic = document.getElementById('birthday-audio');
        const startOverlay = document.getElementById('start-overlay');
        let cells = [];
        let currentPlayer = 'X';
        let gameActive = true;
        let emailSent = false;
        const winnerName = "Hayat";

        // Unlock audio for phone on first tap
        startOverlay.addEventListener('click', function() {
            bdayMusic.play().then(() => {
                bdayMusic.pause();
                bdayMusic.currentTime = 0;
            }).catch(() => {});
            this.style.display = 'none';
        });

        function createBoard() {
            board.innerHTML = '';
            cells = [];
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.addEventListener('click', cellClicked);
                board.appendChild(cell);
                cells.push(cell);
            }
        }

        function cellClicked(e) {
            const cell = e.target;
            if (cell.textContent !== '' || !gameActive) return;
            cell.textContent = currentPlayer;
            checkWin();
            if(gameActive) currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        }

        function checkWin() {
            const wins = [[0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6]];
            for (const combo of wins) {
                const [a, b, c] = combo;
                if (cells[a].textContent && cells[a].textContent === cells[b].textContent && cells[a].textContent === cells[c].textContent) {
                    gameActive = false;
                    celebrate();
                }
            }
        }

        function celebrate() {
            bdayMusic.play().catch(() => {});

            var end = Date.now() + (7 * 1000);
            (function frame() {
                confetti({ particleCount: 4, angle: 60, spread: 60, origin: { x: 0 }, colors: ['#ff4757', '#ffd700', '#ff69b4'] });
                confetti({ particleCount: 4, angle: 120, spread: 60, origin: { x: 1 }, colors: ['#ff4757', '#ffd700', '#ff69b4'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());

            document.getElementById('modal').classList.add('show');
            sendEmail();
        }

        document.getElementById('play-music-btn').addEventListener('click', () => bdayMusic.play());

        document.getElementById('close-modal').addEventListener('click', () => {
            document.getElementById('modal').classList.remove('show');
            bdayMusic.pause();
            bdayMusic.currentTime = 0;
            resetGame();
        });

        function resetGame() {
            currentPlayer = 'X';
            gameActive = true;
            emailSent = false;
            createBoard();
        }

        function sendEmail() {
            if (emailSent) return;
            emailjs.send('service_c2ryvtd', 'template_bb61x18', {
                winner_name: winnerName,
                to_email: 'aayushgupta7513@gmail.com',
                message: `${winnerName} won the birthday game! 🎈`
            }).then(() => emailSent = true);
        }

        createBoard();
    </script>
</body>
</html>
