<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Happy Birthday!</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f0f0f0; }
        h1 { margin-bottom: 20px; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); grid-gap: 5px; }
        .cell { width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; font-size: 2em; background-color: white; cursor: pointer; transition: background-color 0.3s; }
        .cell:hover { background-color: #e0e0e0; }
        .confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>Tic Tac Toe</h1>
    <div class="board" id="board"></div>
    <p id="message" class="hidden"></p>
    <div id="confetti" class="confetti hidden"></div>

    <script>
        const board = document.getElementById('board');
        const message = document.getElementById('message');
        const confetti = document.getElementById('confetti');
        let currentPlayer = 'X';
        const cells = Array(9).fill(null);
        const winningCombinations = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        function createCell(index) {
            const cell = document.createElement('div');
            cell.classList.add('cell');
            cell.addEventListener('click', () => handleClick(index));
            board.appendChild(cell);
        }

        function handleClick(index) {
            if (cells[index] || checkWin()) return;
            cells[index] = currentPlayer;
            render();
            if (checkWin()) {
                message.innerText = `${currentPlayer} wins! 🎉`;
                message.classList.remove('hidden');
                celebrate();
            } else if (cells.every(cell => cell)) {
                message.innerText = `It's a draw!`;
                message.classList.remove('hidden');
            }
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        }

        function render() {
            Array.from(board.children).forEach((cell, index) => {
                cell.innerText = cells[index] || '';
            });
        }

        function checkWin() {
            return winningCombinations.some(combination => {
                const [a, b, c] = combination;
                return cells[a] && cells[a] === cells[b] && cells[a] === cells[c];
            });
        }

        function celebrate() {
            confetti.classList.remove('hidden');
            confetti.innerHTML = `<canvas id='canvas'></canvas>`;
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let particles = [];

            function createParticles(e) {
                for (let i = 0; i < 100; i++) {
                    particles.push({
                        x: e.clientX,
                        y: e.clientY,
                        radius: Math.random() * 5 + 5,
                        color: randomColor(),
                        friction: Math.random() * 0.1 + 0.95,
                        ax: Math.random() * 4 - 2,
                        ay: Math.random() * -4 - 1
                    });
                }
            }

            function randomColor() {
                return `hsl(${Math.random() * 360}, 100%, 50%)`;
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = particles.length - 1; i >= 0; i--) {
                    let p = particles[i];
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                    p.x += p.ax;
                    p.y += p.ay;
                    p.ax *= p.friction;
                    p.ay *= p.friction;
                    p.radius *= 0.95;
                    if (p.radius < 0.3) particles.splice(i, 1);
                }
                requestAnimationFrame(animate);
            }

            window.addEventListener('click', createParticles);
            animate();
        }

        for (let i = 0; i < 9; i++) {
            createCell(i);
        }
    </script>
</body>
</html>
