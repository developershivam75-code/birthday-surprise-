<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Birthday Edition</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          // REPLACE THIS WITH YOUR PUBLIC KEY FROM EMAILJS
          emailjs.init("jWndomUCqjdHtRz4k");
       })();
    </script>

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        h1 { color: #333; margin-bottom: 30px; }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-gap: 8px;
        }
        .cell {
            width: 100px; height: 100px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5em; font-weight: bold;
            background-color: #fff; color: #333;
            cursor: pointer; border: 2px solid #ddd;
            border-radius: 8px; transition: background 0.3s;
        }
        .cell:hover { background-color: #f9f9f9; }
        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.7); justify-content: center; align-items: center;
            z-index: 100;
        }
        .modal-content { 
            background-color: white; padding: 30px; border-radius: 15px; 
            text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .show { display: flex; }
        button { 
            margin-top: 20px; padding: 12px 25px; cursor: pointer; 
            background: #ff4757; color: white; border: none; 
            border-radius: 25px; font-size: 1em; font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Tic Tac Toe</h1>

    <div class="board"></div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2>🎉 Happy Birthday, Chitra! 🎉</h2>
            <p>You've won the game and our hearts! 🎂</p>
            <button id="close-modal">Play Again</button>
        </div>
    </div>

    <script>
        const board = document.querySelector('.board');
        let cells = [];
        let currentPlayer = 'X';
        let gameActive = true;
        let emailSent = false;

        // HARDCODED NAME
        const winnerName = "Chitra";

        function createBoard() {
            board.innerHTML = '';
            cells = [];
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.addEventListener('click', cellClicked);
                board.appendChild(cell);
                cells.push(cell);
            }
        }

        function cellClicked(e) {
            const cell = e.target;
            if (cell.textContent !== '' || !gameActive) return;

            cell.textContent = currentPlayer;
            checkWin();
            if(gameActive) currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        }

        function checkWin() {
            const wins = [
                [0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6]
            ];
            for (const combo of wins) {
                const [a, b, c] = combo;
                if (cells[a].textContent && cells[a].textContent === cells[b].textContent && cells[a].textContent === cells[c].textContent) {
                    gameActive = false;
                    showModal();
                    sendEmail(); 
                }
            }
        }

        function showModal() {
            document.getElementById('modal').classList.add('show');
        }

        function sendEmail() {
    if (emailSent) return;

    const serviceID = 'service_c2ryvtd';
    const templateID = 'template_bb61x18';

    const params = {
        winner_name: winnerName,
        to_email: 'aayushgupta7513@gmail.com', // Explicitly passing your email
        message: `${winnerName} just won the Tic Tac Toe game! 🎈`
    };

    emailjs.send(serviceID, templateID, params)
        .then(() => {
            emailSent = true;
            console.log("Birthday email sent for Chitra!");
        }, (err) => {
            // This will tell us EXACTLY what is wrong in the console
            alert("FAILED TO SEND EMAIL...\n\nError: " + err.text + "\nStatus: " + err.status);
            console.error("Email failed:", err);
                    });
        }
        
        

        document.getElementById('close-modal').addEventListener('click', () => {
            document.getElementById('modal').classList.remove('show');
            resetGame();
        });

        function resetGame() {
            currentPlayer = 'X';
            gameActive = true;
            emailSent = false;
            createBoard();
        }

        createBoard();
    </script>
</body>
</html>
